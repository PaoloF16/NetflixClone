<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="headerShadow">
      <div>
        <img
          src="./Netflix-assets/assets/netflix_logo.png"
          alt=""
          width="150px"
        />
      </div>
    </header>
    <main>
<div class="container py-5 text-light">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-9">

      <!-- Título -->
      <h1 class="display-2 border-bottom pb-3 mb-4">Edit Profile</h1>

      <!-- Sección principal -->
      <div class="row">
        
        <!-- Avatar -->
        <div class="col-12 col-md-3 mb-4 mb-md-0">
          <img
            src="./Netflix-assets/assets/avatar.png"
            alt="avatar"
            class="img-fluid"
            width="150"
            height="150"
          />
        </div>

        <!-- Formulario -->
        <div class="col-12 col-md-9">

          <!-- Usuario + idioma -->
          <div class="pb-4 border-bottom">
            <div class="mb-4">
              <input
                type="text"
                class="form-control rounded-0 border-0 text-light bg-secondary"
                placeholder="Strive Student"
              />
            </div>

            <h3 class="h4 mb-3">Language:</h3>

            <div class="dropdown">
              <button
                class="btn btn-dark border border-light rounded-0 dropdown-toggle w-auto"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                English
              </button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">English</a></li>
                <li><a class="dropdown-item" href="#">Español</a></li>
                <li><a class="dropdown-item" href="#">Français</a></li>
              </ul>
            </div>
          </div>

          <!-- Maturity settings -->
          <div class="py-4 border-bottom">
            <h3 class="h4 mb-3">Maturity Settings:</h3>

            <button class="btn btn-secondary rounded-0 text-uppercase mb-3">
              All Maturity Ratings
            </button>

            <p class="mb-3">
              Show titles of <strong>all maturity ratings</strong> for this
              profile.
            </p>

            <button class="btn btn-outline-light rounded-0 px-4">
              EDIT
            </button>
          </div>

          <!-- Autoplay -->
          <div class="py-4">
            <h3 class="h4 mb-3">Autoplay Controls</h3>

            <div class="form-check mb-3">
              <input
                class="form-check-input rounded-0"
                type="checkbox"
                id="autoplayNext"
                checked
              />
              <label class="form-check-label" for="autoplayNext">
                Autoplay next episode in a series on all devices.
              </label>
            </div>

            <div class="form-check">
              <input
                class="form-check-input rounded-0"
                type="checkbox"
                id="autoplayPreview"
                checked
              />
              <label class="form-check-label" for="autoplayPreview">
                Autoplay previews while browsing on all devices.
              </label>
            </div>
          </div>

        </div>
      </div>

      <!-- Botones finales -->
      <div class="row border-top mt-4 pt-4">
        <div class="col d-flex flex-wrap gap-3">
          <button class="btn btn-light rounded-0 px-4">SAVE</button>
          <button class="btn btn-outline-light rounded-0 px-4">CANCEL</button>
          <button class="btn btn-outline-light rounded-0 px-4">
            DELETE PROFILE
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
    </main>

    <footer></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
